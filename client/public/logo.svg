<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="mark" x1="140" y1="140" x2="372" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DDD6FE"/>
    </linearGradient>
    <linearGradient id="spark" x1="256" y1="160" x2="256" y2="352" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Viewfinder corners — representing "snap/capture" -->
  <!-- Top-left corner -->
  <path d="M152 192V168C152 157 161 148 172 148H196" stroke="url(#mark)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Top-right corner -->
  <path d="M316 148H340C351 148 360 157 360 168V192" stroke="url(#mark)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Bottom-left corner -->
  <path d="M152 320V344C152 355 161 364 172 364H196" stroke="url(#mark)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Bottom-right corner -->
  <path d="M316 364H340C351 364 360 355 360 344V320" stroke="url(#mark)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Center spark — the "snap" moment -->
  <!-- Main diamond -->
  <path d="M256 200L276 244H256H236L256 200Z" fill="url(#spark)"/>
  <path d="M256 312L236 268H256H276L256 312Z" fill="url(#spark)"/>
  <path d="M200 256L244 236V256V276L200 256Z" fill="url(#spark)"/>
  <path d="M312 256L268 276V256V236L312 256Z" fill="url(#spark)"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="16" fill="#FFFFFF"/>
</svg>
